name: API Test Automation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run API in background
        run: npm start &

      - name: Wait until API is running
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/healthcheck > /dev/null; then
              echo "API is healthy"
              exit 0
            fi
            echo "Waiting for API..."
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run API tests
        run: npm run test:path-coverage
