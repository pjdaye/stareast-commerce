openapi: 3.0.0
info:
  title: Stareast Commerce API
  version: 1.0.0
  description: Simple e-commerce API with JWT authentication and checkout.
servers:
  - url: http://localhost:3000
paths:
  /api/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
  /api/login:
    post:
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: JWT token returned
  /api/checkout:
    post:
      summary: Checkout cart items
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items, paymentMethod]
              properties:
                paymentMethod:
                  type: string
                  enum: [cash, credit_card]
                items:
                  type: array
                  items:
                    type: object
                    required: [productId, quantity]
                    properties:
                      productId:
                        type: integer
                      quantity:
                        type: integer
      responses:
        '200':
          description: Checkout completed
  /api/healthcheck:
    get:
      summary: Healthcheck endpoint
      responses:
        '200':
          description: API is healthy
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
